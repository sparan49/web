<html lang="th">

  <meta charset="UTF-8">

  <title>สร้างบิลหลายรายการ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; }
    .bill-dashed-line { border-bottom: 2px dashed #d1d5db; }
    .receipt-container { max-width: 500px; margin: 0 auto; background: white; padding: 1.5rem; border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .product-list { max-height: 240px; overflow-y: auto; border: 1px solid #d1d5db; border-radius: 0.5rem; }
    .option { padding: 0.5rem; cursor: pointer; }
    .option:hover { background-color: #f3f4f6; }
    .ts-price { font-weight: 700; color: #2563eb; font-size: 13px; }
    .border-b { border-bottom-width: 1px; padding-top: 2px; padding-bottom: 2px; }
  </style>
</head>

  </div>

  <!-- Template สำหรับแต่ละบิล -->
  <template id="bill-template">
    <div>
      <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- ฟอร์มสินค้า และข้อมูลลูกค้า -->
        <div class="space-y-6">
          <div class="bg-white p-6 rounded-xl shadow-md space-y-4">
            <div>
              <input type="text" class="customer-name w-full border rounded p-2" placeholder="กรอกชื่อลูกค้า">
            </div>
            <div>
              <input type="text" class="customer-phone w-full border rounded p-2" placeholder="กรอกเบอร์โทร">
            </div>
            <div>
              <select class="shipping-option w-full border rounded p-2">
                <option value="Flash Express">Flash Express</option>
                <option value="ไปรษณีย์ไทย">ไปรษณีย์ไทย</option>
                <option value="Kerry Express">Kerry Express</option>
                <option value="J&T Express">J&T Express</option>
                <option value="Line Man Express">Line Man Express</option>
                <option value="GRAB Express">GRAB Express</option>
              </select>
            </div>
            <div>
              <textarea class="customer-address w-full border rounded p-2" rows="3" placeholder="กรอกที่อยู่"></textarea>
            </div>
            <input type="text" class="product-search w-full border rounded p-2 mb-3" placeholder="พิมพ์เพื่อค้นหาสินค้า...">
            <div class="product-list"></div>
            <div class="grid grid-cols-3 gap-3 mt-3">
              <div>
                <p class="price-display p-2 bg-slate-100 rounded">0</p>
              </div>
              <div>
                <input type="number" class="quantity-input w-full border rounded p-2" value="1" min="1">
              </div>
              <div class="flex items-end">
                <button class="add-to-cart-btn w-full bg-indigo-600 text-white py-2 rounded">เพิ่มลงตะกร้า</button>
              </div>
            </div>
            <table class="w-full text-left">
              <tbody class="cart-items"></tbody>
              <tfoot>
                <tr class="border-t">
                  <td colspan="4" class="p-2 text-right font-bold">ยอดรวม:</td>
                  <td class="grand-total text-right p-2 font-bold">0</td>
                </tr>
              </tfoot>
            </table>
            <button class="copy-order-btn w-full bg-green-600 text-white py-2 rounded mt-3">📋 คัดลอกรายการสั่งซื้อ</button>
          </div>
        </div>

        <!-- พรีวิวบิล -->
        <div>
          <br>
          <div class="bg-white p-6 rounded-xl shadow-md receipt-container">
            <div class="text-center mb-4">
              <img src="https://siam-pod.com/wp-content/uploads/2025/09/LOGO-SIAMPOD.jpg" class="mx-auto mb-2" width="30%">
              <h3 class="text-2xl font-bold" style=" font-size: 27px; ">ใบสรุปรายการสั่งซื้อ</h3>
              <p class="text-sm" style=" padding-top: 10px; ">วันที่: <span class="bill-date"></span></p>
            </div>
            <div class="bill-dashed-line pb-2 mb-3 text-sm">
                <p class="font-bold">ชื่อลูกค้า: <span class="bill-customer-name" style="font-weight: normal;">-</span></p>
                <p class="font-bold">เบอร์โทร: <span class="bill-customer-phone" style="font-weight: normal;">-</span></p>
                <p class="font-bold">ที่อยู่จัดส่ง: <span class="bill-customer-address" style="font-weight: normal;">-</span></p>
                <p class="font-bold">ขนส่ง: <span class="bill-shipping-option" style="font-weight: normal;">Flash Express</span></p>
            </div>
            <div class="flex justify-between items-center text-sm font-bold mb-2">
              <p>รายการสินค้า</p>
              <div class="flex space-x-4 text-right">
                <p class="w-10">จำนวน</p>
                <p class="w-10" style=" margin-left: 0px; ">ราคา</p>
              </div>
            </div>
            <table class="w-full text-sm mb-3">
              <tbody class="bill-items"></tbody>
            </table>
            <div class="text-right">
              <p style=" font-size: 14px; ">รวมราคา: <span class="sub-total">0</span> บาท</p>
              <p style=" font-size: 14px; ">ค่าส่ง: <span class="shipping-fee">35</span> บาท</p>
              <p class="font-bold text-lg">ยอดรวม: <span class="bill-total">0</span> บาท</p>
              <p class="text-xs text-slate-500 font-medium mt-1">หมายเหตุ: ซื้อ 2 ชิ้นขึ้นไป หรือยอด 489บ. ส่งฟรี</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </template>

    // สร้าง Section สำหรับแต่ละบิล
    document.querySelectorAll(".bill-section").forEach((sec, i) => {
      const tpl = document.querySelector("#bill-template").content.cloneNode(true);
      sec.appendChild(tpl);
    });

    // ฟังก์ชันทำงานในแต่ละบิล
    document.querySelectorAll(".bill-section").forEach(section => {
      const productList = section.querySelector(".product-list");
      const productSearch = section.querySelector(".product-search");
      const priceDisplay = section.querySelector(".price-display");
      const qtyInput = section.querySelector(".quantity-input");
      const addBtn = section.querySelector(".add-to-cart-btn");
      const cartItems = section.querySelector(".cart-items");
      const grandTotal = section.querySelector(".grand-total");
      const billItems = section.querySelector(".bill-items");
      const subTotal = section.querySelector(".sub-total");
      const billTotal = section.querySelector(".bill-total");
      const billDate = section.querySelector(".bill-date");
      const shippingFeeEl = section.querySelector(".shipping-fee");
      const copyOrderBtn = section.querySelector(".copy-order-btn");

      // ฟอร์มลูกค้า
      const customerName = section.querySelector(".customer-name");
      const customerPhone = section.querySelector(".customer-phone");
      const customerAddress = section.querySelector(".customer-address");
      const shippingOption = section.querySelector(".shipping-option");

      const billCustomerName = section.querySelector(".bill-customer-name");
      const billCustomerPhone = section.querySelector(".bill-customer-phone");
      const billCustomerAddress = section.querySelector(".bill-customer-address");
      const billShippingOption = section.querySelector(".bill-shipping-option");

      let total = 0;
      let selectedProduct = null;
      let itemCount = 0;
      const baseShipping = 35;

      // วันที่
      billDate.textContent = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', hour:'2-digit', minute:'2-digit'});

      // sync customer data
      customerName.addEventListener("input", () => billCustomerName.textContent = customerName.value);
      customerPhone.addEventListener("input", () => billCustomerPhone.textContent = customerPhone.value);
      customerAddress.addEventListener("input", () => billCustomerAddress.textContent = customerAddress.value);
      shippingOption.addEventListener("change", () => billShippingOption.textContent = shippingOption.value);

      // render products
      function renderProducts(filter = "") {
        productList.innerHTML = "";
        products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())).forEach(p => {
          const div = document.createElement("div");
          div.className = "option flex justify-between items-center w-full border-b";
          div.dataset.value = p.id;
          div.innerHTML = `
            <div class="ts-product-info">
              <span class="font-bold text-sm text-gray-800">${p.category} :</span>
              <span class="text-sm text-gray-600">${p.name}</span>
            </div>
            <div class="ts-price text-right">${p.price} บาท</div>
          `;
          div.addEventListener("click", () => {
            selectedProduct = p;
            priceDisplay.textContent = p.price;
          });
          productList.appendChild(div);
        });
      }
      renderProducts();

      productSearch.addEventListener("input", () => {
        renderProducts(productSearch.value);
      });

      function updateTotals() {
        let shippingFee = baseShipping;
        if (itemCount >= 2 || total >= 489) {
          shippingFee = 0;
        }
        shippingFeeEl.textContent = shippingFee;
        billTotal.textContent = total + shippingFee;
      }

      // กดเพิ่มลงตะกร้า
      addBtn.addEventListener("click", () => {
        if (!selectedProduct) return;
        const name = selectedProduct.name;
        const price = selectedProduct.price;
        const qty = parseInt(qtyInput.value);
        if (!name || qty < 1) return;

        const sum = price * qty;
        total += sum;
        itemCount += qty;

        // แสดงในตะกร้า
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="p-2">${name}</td><td class="p-2 text-right">${price}</td><td class="p-2 text-right">${qty}</td><td class="p-2 text-right">${sum}</td><td class="p-2 text-center"><span class="remove-btn" style="color: red;">✖</span></td>`;
        cartItems.appendChild(tr);

        // แสดงในใบเสร็จ
        const billRow = document.createElement("tr");
        billRow.innerHTML = `
          <td style="">${name}</td>
          <td class="text-right" style="padding-right: 15px;padding-left: 30px;">${qty}</td>
          <td class="text-right" style="padding:0px;">${sum}</td>
        `;
        billItems.appendChild(billRow);

        // อัปเดตยอดรวม
        grandTotal.textContent = total;
        subTotal.textContent = total;
        updateTotals();

        // ฟังก์ชันลบสินค้า
        tr.querySelector(".remove-btn").addEventListener("click", () => {
          tr.remove();
          billRow.remove();
          total -= sum;
          itemCount -= qty;
          grandTotal.textContent = total;
          subTotal.textContent = total;
          updateTotals();
        });
      });

      // ปุ่มคัดลอกรายการสั่งซื้อ
      copyOrderBtn.addEventListener("click", () => {
        let orderText = `ที่อยู่ในการจัดส่ง
ชื่อผู้รับ: ${billCustomerName.textContent}
เบอร์โทร: ${billCustomerPhone.textContent}
ที่อยู่: ${billCustomerAddress.textContent}
ขนส่ง: ${billShippingOption.textContent}

รายการสินค้า:
`;
        section.querySelectorAll(".bill-items tr").forEach(row => {
          const cols = row.querySelectorAll("td");
          orderText += `• ${cols[0].textContent} | ${cols[1].textContent} จำนวน | ${cols[2].textContent} บาท
`;
        });
        orderText += `
รวม: ${subTotal.textContent} บาท
ค่าส่ง: ${shippingFeeEl.textContent} บาท
ยอดรวม: ${billTotal.textContent} บาท`;

        navigator.clipboard.writeText(orderText).then(() => {
          alert("✅ คัดลอกรายการสั่งซื้อเรียบร้อยแล้ว!");
        });
      });
    });
  </script>
